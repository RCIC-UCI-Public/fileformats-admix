!include hdf5-common.yaml
---
- baserpm: "{{name}}_{{version}}_{{compiler}}_{{compiler_version}}"
  root: "{{pkg_defaults.app_path}}/{{name}}/{{version}}/{{compiler}}/{{compiler_version}}"
  description: "{{base_description}}"

  # These arguments are for Rocky 10 for C/C++ that are not NVCC.
  nvcc: False
  os10: !OScmp ">=, 10, True, False"
  cargs_10:  -DCMAKE_C_FLAGS=\\"-Wno-error=implicit-function-declaration -Wno-error=incompatible-pointer-types\\" -DCMAKE_CXX_FLAGS=\\"-Wno-error=implicit-function-declaration -Wno-error=incompatible-pointer-types\\"
  add_cargs: !eval "'{{cargs_10}}' if not {{nvcc}} and {{os10}} else ''"

  build:
    configure_args: >
      -DCMAKE_BUILD_TYPE=Release
      -DHDF5_BUILD_FORTRAN:BOOL=ON
      -DHDF5_BUILD_CPP_LIB:BOOL=ON
      -DHDF5_BUILD_JAVA:BOOL=ON
      -DHDF5_ENABLE_{{zlibname}}_SUPPORT=ON
      -DCMAKE_INSTALL_PREFIX={{root}} 
      {{add_cargs}}
      ..
