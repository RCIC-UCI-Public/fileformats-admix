# This is for compileing older hdf5 1.10.5 on ROcky 10.
# The last two argumetns for cmake  allow to compile
!include hdf5.yaml
---
- build:
    configure_args: >
      -DCMAKE_BUILD_TYPE=Release
      -DHDF5_BUILD_FORTRAN:BOOL=ON
      -DHDF5_BUILD_CPP_LIB:BOOL=ON
      -DHDF5_BUILD_JAVA:BOOL=ON
      -DHDF5_ENABLE_{{zlibname}}_SUPPORT=ON
      -DCMAKE_INSTALL_PREFIX={{root}}
      -DCMAKE_C_FLAGS='-Wno-error=implicit-function-declaration -Wno-error=incompatible-pointer-types'
      -DCMAKE_CXX_FLAGS='-Wno-error=implicit-function-declaration -Wno-error=incompatible-pointer-types' 
      ..
